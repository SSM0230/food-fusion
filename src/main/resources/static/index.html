<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="description" content="Food Fusion - A Premium Creative Food Delivery Experience. Sustainable packaging, group ordering lobbies, custom meal creators, and rewards.">
    <title>Food Fusion - Premium Food Delivery App</title>
    <!-- Bootstrap & Font Awesome CDNs -->
    <link rel="icon" type="image/png" href="images/logo.png">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link rel="stylesheet" href="css/styles.css">
</head>
<body>

    <!-- Navigation Header -->
    <header class="glass-panel">
        <div class="logo" onclick="App.navigateTo('home')">
            <i class="fa-solid fa-utensils text-warning me-2"></i>Food Fusion
        </div>
        <div style="display:flex; align-items:center; gap:20px;">
            <button class="theme-toggle-btn" onclick="App.toggleTheme()" title="Toggle Light/Dark Theme" id="theme-toggle-btn"><i class="fa-solid fa-sun"></i></button>
            <nav id="nav-links">
                <a onclick="App.navigateTo('home')"><i class="fa-solid fa-house"></i> Home</a>
                <a class="btn btn-primary btn-sm" onclick="App.navigateTo('login')">Login / Sign Up</a>
            </nav>
        </div>
    </header>

    <!-- Dynamic View Target -->
    <main id="main-content" class="container">
        <!-- Rendered dynamically by app.js -->
        <div style="text-align:center; padding:100px 0;">
            <h2 style="margin-bottom:10px;">Loading Food Fusion Experience...</h2>
            <p style="color:var(--text-muted);">Please wait a moment.</p>
        </div>
    </main>

    <!-- Application Scripts -->
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
    <script src="js/components.js"></script>
    <script src="js/app.js"></script>
</body>
</html>
